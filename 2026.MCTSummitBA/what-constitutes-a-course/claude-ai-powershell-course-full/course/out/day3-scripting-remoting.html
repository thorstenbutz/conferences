</style></head><body><div class="bespoke-marp-osc"><button data-bespoke-marp-osc="prev" tabindex="-1" title="Previous slide">Previous slide</button><span data-bespoke-marp-osc="page"></span><button data-bespoke-marp-osc="next" tabindex="-1" title="Next slide">Next slide</button><button data-bespoke-marp-osc="fullscreen" tabindex="-1" title="Toggle fullscreen (f)">Toggle fullscreen</button><button data-bespoke-marp-osc="overview" tabindex="-1" title="Toggle overview view (o)">Toggle overview view</button><button data-bespoke-marp-osc="presenter" tabindex="-1" title="Open presenter view (p)">Open presenter view</button></div><div id=":$p"><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="1" data-paginate="true" data-class="title" data-theme="noble-blue" lang="POSIX" class="title" data-marpit-pagination="1" style="--paginate:true;--class:title;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="powershell-7-for-it-administrators">PowerShell 7 for IT Administrators</h1>
<h2 id="day-3--variables-scripting-remoting-jobs">Day 3 — Variables, Scripting, Remoting, Jobs</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="2" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="where-we-are">Where we are</h2>
<ul>
<li><strong>Days 1–2:</strong> everything interactive — type, pipe, inspect</li>
<li><strong>Today:</strong> save what we type, parameterise it, run it elsewhere</li>
<li><strong>Tomorrow:</strong> apply all of it to AD and EntraID</li>
</ul>
<blockquote>
<p>Note: advanced function authoring, parameter sets, and <code>ShouldProcess</code><br />
are covered in the follow-on course. Today we write <strong>simple, useful scripts.</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-class="section" data-theme="noble-blue" lang="POSIX" class="section" data-marpit-pagination="3" style="--paginate:true;--class:section;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="part-1">Part 1</h1>
<h2 id="variables-arrays-hashtables">Variables, arrays, hashtables</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="4" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="variables">Variables</h2>
<pre><code class="language-powershell"><span class="hljs-variable">$name</span>  = <span class="hljs-string">&#x27;Anna&#x27;</span>
<span class="hljs-variable">$count</span> = <span class="hljs-number">42</span>
<span class="hljs-variable">$today</span> = <span class="hljs-built_in">Get-Date</span>
</code></pre>
<ul>
<li>Start with <code>$</code></li>
<li><strong>Dynamically typed</strong> — the type is inferred from the value</li>
<li>Names are case-insensitive; use <code>camelCase</code> or <code>PascalCase</code>, not <code>snake_case</code></li>
</ul>
<p>Inspect:</p>
<pre><code class="language-powershell"><span class="hljs-variable">$name</span>.GetType().FullName     <span class="hljs-comment"># System.String</span>
<span class="hljs-variable">$count</span>.GetType().FullName    <span class="hljs-comment"># System.Int32</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="5" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="type-it-if-it-matters">Type it if it matters</h2>
<pre><code class="language-powershell">[<span class="hljs-built_in">int</span>]    <span class="hljs-variable">$port</span>     = <span class="hljs-number">443</span>
[<span class="hljs-built_in">string</span>] <span class="hljs-variable">$hostname</span> = <span class="hljs-string">&#x27;dc01&#x27;</span>
[<span class="hljs-type">uint32</span>] <span class="hljs-variable">$flags</span>    = <span class="hljs-number">0</span>x0001
[<span class="hljs-built_in">bool</span>]   <span class="hljs-variable">$enabled</span>  = <span class="hljs-variable">$true</span>
</code></pre>
<p>Why bother?</p>
<ul>
<li>Self-documenting intent</li>
<li>Early failure if a caller passes junk</li>
<li>Bitwise arithmetic needs <strong>unsigned</strong> types (<code>[uint32]</code>) to avoid sign-extension bugs</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="6" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="arrays">Arrays</h2>
<pre><code class="language-powershell"><span class="hljs-variable">$colors</span> = <span class="hljs-selector-tag">@</span>(<span class="hljs-string">&#x27;red&#x27;</span>, <span class="hljs-string">&#x27;green&#x27;</span>, <span class="hljs-string">&#x27;blue&#x27;</span>)
<span class="hljs-variable">$colors</span>[<span class="hljs-number">0</span>]          <span class="hljs-comment"># red</span>
<span class="hljs-variable">$colors</span>[-<span class="hljs-number">1</span>]         <span class="hljs-comment"># blue</span>
<span class="hljs-variable">$colors</span>.Count       <span class="hljs-comment"># 3</span>
<span class="hljs-variable">$colors</span> += <span class="hljs-string">&#x27;yellow&#x27;</span> <span class="hljs-comment"># returns a NEW array</span>
</code></pre>
<p>Ranges:</p>
<pre><code class="language-powershell"><span class="hljs-variable">$nums</span> = <span class="hljs-number">1</span>..<span class="hljs-number">10</span>
<span class="hljs-variable">$letters</span> = <span class="hljs-string">&#x27;a&#x27;</span>..<span class="hljs-string">&#x27;e&#x27;</span>
</code></pre>
<blockquote>
<p>Appending with <code>+=</code> rebuilds the array each time. For &gt;1000 items,<br />
use <code>[System.Collections.Generic.List[object]]::new()</code> instead.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="7" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="hashtables">Hashtables</h2>
<pre><code class="language-powershell"><span class="hljs-variable">$user</span> = <span class="hljs-selector-tag">@</span>{
    Name  = <span class="hljs-string">&#x27;Anna Schmidt&#x27;</span>
    Dept  = <span class="hljs-string">&#x27;Sales&#x27;</span>
    Id    = <span class="hljs-number">42</span>
}

<span class="hljs-variable">$user</span>[<span class="hljs-string">&#x27;Name&#x27;</span>]        <span class="hljs-comment"># access by key</span>
<span class="hljs-variable">$user</span>.Dept           <span class="hljs-comment"># dot also works</span>
<span class="hljs-variable">$user</span>.Keys
<span class="hljs-variable">$user</span>.Add(<span class="hljs-string">&#x27;City&#x27;</span>, <span class="hljs-string">&#x27;Duisburg&#x27;</span>)
</code></pre>
<p>Ordered hashtable (preserves insertion order):</p>
<pre><code class="language-powershell"><span class="hljs-variable">$config</span> = [<span class="hljs-type">ordered</span>]<span class="hljs-selector-tag">@</span>{
    Server = <span class="hljs-string">&#x27;LON-DC1&#x27;</span>
    Port   = <span class="hljs-number">443</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="8" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="pscustomobject--the-admins-friend">PSCustomObject — the admin's friend</h2>
<p>Build real objects from data:</p>
<pre><code class="language-powershell"><span class="hljs-variable">$report</span> = [<span class="hljs-type">pscustomobject</span>]<span class="hljs-selector-tag">@</span>{
    Computer = <span class="hljs-variable">$env:COMPUTERNAME</span>
    User     = <span class="hljs-variable">$env:USERNAME</span>
    Date     = <span class="hljs-built_in">Get-Date</span>
    PSVersion = <span class="hljs-variable">$PSVersionTable</span>.PSVersion.ToString()
}

<span class="hljs-variable">$report</span> | <span class="hljs-built_in">Format-List</span>
<span class="hljs-variable">$report</span> | <span class="hljs-built_in">Export-Csv</span> report.csv <span class="hljs-literal">-NoTypeInformation</span>
</code></pre>
<p>Use this instead of <code>Write-Host</code> for anything you want to pipe or export.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="9" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="splatting--pass-parameters-as-a-hashtable">Splatting — pass parameters as a hashtable</h2>
<p>Painful:</p>
<pre><code class="language-powershell"><span class="hljs-built_in">New-ADUser</span> <span class="hljs-literal">-Name</span> <span class="hljs-string">&#x27;Anna&#x27;</span> <span class="hljs-literal">-SamAccountName</span> <span class="hljs-string">&#x27;aschmidt&#x27;</span> `
           <span class="hljs-literal">-GivenName</span> <span class="hljs-string">&#x27;Anna&#x27;</span> <span class="hljs-literal">-Surname</span> <span class="hljs-string">&#x27;Schmidt&#x27;</span> `
           <span class="hljs-literal">-UserPrincipalName</span> <span class="hljs-string">&#x27;aschmidt@adatum.com&#x27;</span> `
           <span class="hljs-literal">-Path</span> <span class="hljs-string">&#x27;OU=Sales,DC=adatum,DC=com&#x27;</span> <span class="hljs-literal">-Enabled</span> <span class="hljs-variable">$true</span>
</code></pre>
<p>Beautiful:</p>
<pre><code class="language-powershell"><span class="hljs-variable">$userParams</span> = <span class="hljs-selector-tag">@</span>{
    Name              = <span class="hljs-string">&#x27;Anna&#x27;</span>
    SamAccountName    = <span class="hljs-string">&#x27;aschmidt&#x27;</span>
    GivenName         = <span class="hljs-string">&#x27;Anna&#x27;</span>
    Surname           = <span class="hljs-string">&#x27;Schmidt&#x27;</span>
    UserPrincipalName = <span class="hljs-string">&#x27;aschmidt@adatum.com&#x27;</span>
    Path              = <span class="hljs-string">&#x27;OU=Sales,DC=adatum,DC=com&#x27;</span>
    Enabled           = <span class="hljs-variable">$true</span>
}
<span class="hljs-built_in">New-ADUser</span> @userParams
</code></pre>
<p><code>@</code> instead of <code>$</code> tells PowerShell: &quot;spread this into parameters&quot;.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-class="section" data-theme="noble-blue" lang="POSIX" class="section" data-marpit-pagination="10" style="--paginate:true;--class:section;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="part-2">Part 2</h1>
<h2 id="scripts-and-flow-control">Scripts and flow control</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="11" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="from-command-to-ps1">From command to <code>.ps1</code></h2>
<p>A script is just a file with commands in it.</p>
<pre><code class="language-powershell"><span class="hljs-comment"># hello.ps1</span>
<span class="hljs-keyword">param</span>(
    [<span class="hljs-built_in">string</span>] <span class="hljs-variable">$Name</span> = <span class="hljs-string">&#x27;World&#x27;</span>
)
<span class="hljs-string">&quot;Hello, <span class="hljs-variable">$Name</span>!&quot;</span>
<span class="hljs-string">&quot;PowerShell <span class="hljs-variable">$</span>(<span class="hljs-variable">$PSVersionTable</span>.PSVersion)&quot;</span>
</code></pre>
<p>Run it:</p>
<pre><code class="language-powershell">.\hello.ps1
.\hello.ps1 <span class="hljs-literal">-Name</span> <span class="hljs-string">&#x27;Thorsten&#x27;</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-class="history" data-theme="noble-blue" lang="POSIX" class="history" data-marpit-pagination="12" style="--paginate:true;--class:history;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="execution-policy--a-short-history">Execution policy — a short history</h2>
<ul>
<li>Introduced in PowerShell 1.0 (2006) in response to ILOVEYOU-era VBScript fear</li>
<li><strong>Not a security boundary</strong> — it's a &quot;seatbelt&quot;, easily bypassed</li>
<li>Default on Windows clients: <code>Restricted</code> (no scripts at all)</li>
<li>Default on servers: <code>RemoteSigned</code> (local OK, downloaded needs signature)</li>
</ul>
<pre><code class="language-powershell"><span class="hljs-built_in">Get-ExecutionPolicy</span> <span class="hljs-literal">-List</span>
<span class="hljs-built_in">Set-ExecutionPolicy</span> RemoteSigned <span class="hljs-literal">-Scope</span> CurrentUser
</code></pre>
<blockquote>
<p>Microsoft's own docs describe execution policy as a <em>&quot;user convenience feature, not a security system.&quot;</em></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="13" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="flow-control-if--elseif--else">Flow control: <code>if</code> / <code>elseif</code> / <code>else</code></h2>
<pre><code class="language-powershell"><span class="hljs-variable">$svc</span> = <span class="hljs-built_in">Get-Service</span> Spooler

<span class="hljs-keyword">if</span> (<span class="hljs-variable">$svc</span>.Status <span class="hljs-operator">-eq</span> <span class="hljs-string">&#x27;Running&#x27;</span>) {
    <span class="hljs-string">&#x27;Spooler is running&#x27;</span>
} <span class="hljs-keyword">elseif</span> (<span class="hljs-variable">$svc</span>.Status <span class="hljs-operator">-eq</span> <span class="hljs-string">&#x27;Stopped&#x27;</span>) {
    <span class="hljs-string">&#x27;Spooler is stopped&#x27;</span>
} <span class="hljs-keyword">else</span> {
    <span class="hljs-string">&quot;Spooler is in state: <span class="hljs-variable">$</span>(<span class="hljs-variable">$svc</span>.Status)&quot;</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="14" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="switch--the-multi-arm-if"><code>switch</code> — the multi-arm if</h2>
<pre><code class="language-powershell"><span class="hljs-keyword">switch</span> (<span class="hljs-variable">$svc</span>.Status) {
    <span class="hljs-string">&#x27;Running&#x27;</span>     { <span class="hljs-string">&#x27;OK&#x27;</span>         ; <span class="hljs-keyword">break</span> }
    <span class="hljs-string">&#x27;Stopped&#x27;</span>     { <span class="hljs-string">&#x27;Start me&#x27;</span>   ; <span class="hljs-keyword">break</span> }
    <span class="hljs-string">&#x27;StartPending&#x27;</span>{ <span class="hljs-string">&#x27;Wait a bit&#x27;</span> ; <span class="hljs-keyword">break</span> }
    default       { <span class="hljs-string">&#x27;Unexpected&#x27;</span> }
}
</code></pre>
<p>Wildcards and regex:</p>
<pre><code class="language-powershell"><span class="hljs-keyword">switch</span> <span class="hljs-operator">-Wildcard</span> (<span class="hljs-variable">$hostname</span>) {
    <span class="hljs-string">&#x27;LON-*&#x27;</span> { <span class="hljs-string">&#x27;London site&#x27;</span> }
    <span class="hljs-string">&#x27;DUS-*&#x27;</span> { <span class="hljs-string">&#x27;Duesseldorf site&#x27;</span> }
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="15" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="loops">Loops</h2>
<pre><code class="language-powershell"><span class="hljs-comment"># foreach — most common</span>
<span class="hljs-keyword">foreach</span> (<span class="hljs-variable">$svc</span> <span class="hljs-keyword">in</span> <span class="hljs-built_in">Get-Service</span>) {
    <span class="hljs-keyword">if</span> (<span class="hljs-variable">$svc</span>.Status <span class="hljs-operator">-eq</span> <span class="hljs-string">&#x27;Stopped&#x27;</span>) { <span class="hljs-variable">$svc</span>.Name }
}

<span class="hljs-comment"># for — when you need the index</span>
<span class="hljs-keyword">for</span> (<span class="hljs-variable">$i</span> = <span class="hljs-number">0</span>; <span class="hljs-variable">$i</span> <span class="hljs-operator">-lt</span> <span class="hljs-number">5</span>; <span class="hljs-variable">$i</span>++) { <span class="hljs-string">&quot;Attempt <span class="hljs-variable">$i</span>&quot;</span> }

<span class="hljs-comment"># while / do-while</span>
<span class="hljs-variable">$tries</span> = <span class="hljs-number">0</span>
<span class="hljs-keyword">do</span> {
    <span class="hljs-variable">$tries</span>++
    <span class="hljs-built_in">Start-Sleep</span> <span class="hljs-number">1</span>
} <span class="hljs-keyword">while</span> (<span class="hljs-variable">$tries</span> <span class="hljs-operator">-lt</span> <span class="hljs-number">3</span>)
</code></pre>
<p><code>foreach</code> keyword ≠ <code>ForEach-Object</code> cmdlet — but both exist.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="16" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="error-handling-try--catch">Error handling: <code>try</code> / <code>catch</code></h2>
<p>Terminating errors stop the script; non-terminating don't.</p>
<pre><code class="language-powershell"><span class="hljs-keyword">try</span> {
    <span class="hljs-built_in">Get-Content</span> <span class="hljs-string">&#x27;C:\does-not-exist.txt&#x27;</span> <span class="hljs-literal">-ErrorAction</span> Stop
} <span class="hljs-keyword">catch</span> {
    <span class="hljs-built_in">Write-Warning</span> <span class="hljs-string">&quot;Failed: <span class="hljs-variable">$</span>(<span class="hljs-variable">$_</span>.Exception.Message)&quot;</span>
} <span class="hljs-keyword">finally</span> {
    <span class="hljs-string">&#x27;Cleanup happens regardless&#x27;</span>
}
</code></pre>
<p>Key flag: <strong><code>-ErrorAction Stop</code></strong> upgrades non-terminating errors to terminating.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="17" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="write--family--use-the-right-one">Write-* family — use the right one</h2>
<table>
<thead>
<tr>
<th>Cmdlet</th>
<th>Goes to</th>
<th>Use for</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>Write-Output</code></td>
<td>pipeline</td>
<td>the thing the script produces</td>
</tr>
<tr>
<td><code>Write-Verbose</code></td>
<td>verbose stream</td>
<td>diagnostics (off by default)</td>
</tr>
<tr>
<td><code>Write-Warning</code></td>
<td>warning stream</td>
<td>something's off, but keep going</td>
</tr>
<tr>
<td><code>Write-Error</code></td>
<td>error stream</td>
<td>something's wrong</td>
</tr>
<tr>
<td><code>Write-Host</code></td>
<td>screen only</td>
<td>user interaction (prompts, colour)</td>
</tr>
</tbody>
</table>
<p><strong>Never <code>Write-Host</code> data you want to pipe.</strong> Use <code>Write-Output</code> or just emit the object.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-class="section" data-theme="noble-blue" lang="POSIX" class="section" data-marpit-pagination="18" style="--paginate:true;--class:section;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="part-3">Part 3</h1>
<h2 id="modules">Modules</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="19" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="finding-and-installing-modules">Finding and installing modules</h2>
<pre><code class="language-powershell"><span class="hljs-built_in">Find-Module</span> Microsoft.Graph.Users        <span class="hljs-comment"># search PSGallery</span>
<span class="hljs-built_in">Install-Module</span> Microsoft.Graph <span class="hljs-literal">-Scope</span> CurrentUser
<span class="hljs-built_in">Get-Module</span> Microsoft.Graph* <span class="hljs-literal">-ListAvailable</span>
<span class="hljs-built_in">Import-Module</span> Microsoft.Graph.Users
</code></pre>
<ul>
<li><strong>Scope CurrentUser</strong> — no admin needed, installs to <code>$HOME\Documents\PowerShell\Modules</code></li>
<li><strong>Scope AllUsers</strong> — admin needed, installs to <code>$env:ProgramFiles\PowerShell\Modules</code></li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="20" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="psresourceget--the-next-generation">PSResourceGet — the next generation</h2>
<p>The classic <code>PowerShellGet</code> v2 is being replaced by <strong>Microsoft.PowerShell.PSResourceGet</strong>.</p>
<pre><code class="language-powershell"><span class="hljs-built_in">Install-Module</span> Microsoft.PowerShell.PSResourceGet
<span class="hljs-built_in">Find-PSResource</span> Microsoft.Graph
<span class="hljs-built_in">Install-PSResource</span> Microsoft.Graph <span class="hljs-literal">-Scope</span> CurrentUser
</code></pre>
<p>Faster, better dependency handling, drop-in successor. Keep an eye on it — <code>Install-Module</code> will eventually retire.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-class="section" data-theme="noble-blue" lang="POSIX" class="section" data-marpit-pagination="21" style="--paginate:true;--class:section;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="part-4">Part 4</h1>
<h2 id="remoting">Remoting</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="22" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="three-flavours-of-remoting">Three flavours of remoting</h2>
<table>
<thead>
<tr>
<th>Cmdlet</th>
<th>Scenario</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>Invoke-Command</code></td>
<td>Run a block on one-or-many machines, get results</td>
</tr>
<tr>
<td><code>Enter-PSSession</code></td>
<td>Open an interactive shell on a remote box</td>
</tr>
<tr>
<td><code>New-PSSession</code></td>
<td>Persistent session, reuse across multiple calls</td>
</tr>
</tbody>
</table>
<p>All three work over:</p>
<ul>
<li><strong>WinRM</strong> (classic, HTTP/HTTPS, firewall-managed)</li>
<li><strong>SSH</strong> — PowerShell 7 only, cross-platform</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="23" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="one-command-many-machines">One command, many machines</h2>
<pre><code class="language-powershell"><span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span>, LON<span class="hljs-literal">-CL1</span> <span class="hljs-literal">-ScriptBlock</span> {
    <span class="hljs-built_in">Get-CimInstance</span> Win32_OperatingSystem |
        <span class="hljs-built_in">Select-Object</span> CSName, Caption, LastBootUpTime
}
</code></pre>
<p>Results include a <code>PSComputerName</code> property so you know who said what.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="24" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="persistent-session">Persistent session</h2>
<pre><code class="language-powershell"><span class="hljs-variable">$s</span> = <span class="hljs-built_in">New-PSSession</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span>

<span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-Session</span> <span class="hljs-variable">$s</span> <span class="hljs-literal">-ScriptBlock</span> { <span class="hljs-built_in">Get-Service</span> DNS }
<span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-Session</span> <span class="hljs-variable">$s</span> <span class="hljs-literal">-ScriptBlock</span> { <span class="hljs-built_in">Get-ADUser</span> <span class="hljs-literal">-Filter</span> * | <span class="hljs-built_in">Measure-Object</span> }

<span class="hljs-built_in">Remove-PSSession</span> <span class="hljs-variable">$s</span>
</code></pre>
<p>Faster: one handshake, many calls.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="25" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="interactive-session">Interactive session</h2>
<pre><code class="language-powershell"><span class="hljs-built_in">Enter-PSSession</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span>
<span class="hljs-comment"># prompt changes to:  [LON-DC1]: PS C:\&gt; _</span>
<span class="hljs-comment"># do things as if you were logged in</span>
<span class="hljs-built_in">Exit-PSSession</span>
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" data-paginate="true" data-class="gotcha" data-theme="noble-blue" lang="POSIX" class="gotcha" data-marpit-pagination="26" style="--paginate:true;--class:gotcha;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="variables-on-the-remote-side">Variables on the remote side</h2>
<p>The script block runs on the remote machine — local variables don't travel<br />
automatically.</p>
<pre><code class="language-powershell"><span class="hljs-variable">$svcName</span> = <span class="hljs-string">&#x27;Spooler&#x27;</span>
<span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span> <span class="hljs-literal">-ScriptBlock</span> {
    <span class="hljs-built_in">Get-Service</span> <span class="hljs-variable">$svcName</span>      <span class="hljs-comment"># ← undefined over there</span>
}
</code></pre>
<p>Fix with <code>$using:</code> or the <code>-ArgumentList</code> parameter:</p>
<pre><code class="language-powershell"><span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span> <span class="hljs-literal">-ScriptBlock</span> {
    <span class="hljs-built_in">Get-Service</span> <span class="hljs-variable">$using:svcName</span>
}
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" data-paginate="true" data-class="section" data-theme="noble-blue" lang="POSIX" class="section" data-marpit-pagination="27" style="--paginate:true;--class:section;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="part-5">Part 5</h1>
<h2 id="background-jobs">Background jobs</h2>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="28" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="start-job--fire-and-forget"><code>Start-Job</code> — fire and forget</h2>
<pre><code class="language-powershell"><span class="hljs-variable">$job</span> = <span class="hljs-built_in">Start-Job</span> <span class="hljs-literal">-ScriptBlock</span> {
    <span class="hljs-built_in">Get-ChildItem</span> C:\ <span class="hljs-literal">-Recurse</span> <span class="hljs-literal">-ErrorAction</span> SilentlyContinue |
        <span class="hljs-built_in">Measure-Object</span> <span class="hljs-literal">-Property</span> Length <span class="hljs-literal">-Sum</span>
}

<span class="hljs-built_in">Get-Job</span>
<span class="hljs-built_in">Wait-Job</span>    <span class="hljs-variable">$job</span>
<span class="hljs-built_in">Receive-Job</span> <span class="hljs-variable">$job</span>
<span class="hljs-built_in">Remove-Job</span>  <span class="hljs-variable">$job</span>
</code></pre>
<p>Jobs run in a separate PowerShell process. Results queue until you <code>Receive-Job</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="29" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="remote-jobs">Remote jobs</h2>
<pre><code class="language-powershell"><span class="hljs-built_in">Invoke-Command</span> <span class="hljs-literal">-ComputerName</span> LON<span class="hljs-literal">-DC1</span>, LON<span class="hljs-literal">-CL1</span> <span class="hljs-literal">-AsJob</span> <span class="hljs-literal">-ScriptBlock</span> {
    <span class="hljs-built_in">Get-CimInstance</span> Win32_OperatingSystem
}

<span class="hljs-built_in">Get-Job</span> | <span class="hljs-built_in">Wait-Job</span> | <span class="hljs-built_in">Receive-Job</span>
</code></pre>
<p>All target machines in parallel, results collected at the end.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="30" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="foreach-object--parallel-vs-jobs"><code>ForEach-Object -Parallel</code> vs jobs</h2>
<table>
<thead>
<tr>
<th>Use</th>
<th>When</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>ForEach-Object -Parallel</code></td>
<td>CPU-bound or I/O-bound batch, same box</td>
</tr>
<tr>
<td><code>Start-Job</code></td>
<td>Long-running, survive this prompt</td>
</tr>
<tr>
<td><code>Invoke-Command -AsJob</code></td>
<td>Many remote machines, collect later</td>
</tr>
</tbody>
</table>
<p>For most admin work, <code>-Parallel</code> is the simplest win.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" data-paginate="true" data-class="lab" data-theme="noble-blue" lang="POSIX" class="lab" data-marpit-pagination="31" style="--paginate:true;--class:lab;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="lab-5">Lab 5</h1>
<h2 id="from-one-liners-to-a-script">From one-liners to a script</h2>
<p><strong>Goal:</strong> Take yesterday's best pipeline and turn it into a parameterised<br />
<code>.ps1</code> with error handling that emits <code>PSCustomObject</code>s.</p>
<p><strong>Duration:</strong> ~60 minutes</p>
<p>Open <code>labs/lab05-scripting.md</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" data-paginate="true" data-class="lab" data-theme="noble-blue" lang="POSIX" class="lab" data-marpit-pagination="32" style="--paginate:true;--class:lab;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="lab-6">Lab 6</h1>
<h2 id="remoting-in-anger">Remoting in anger</h2>
<p><strong>Goal:</strong> Run your health-check script against the DC via <code>Invoke-Command</code>,<br />
collect results from multiple machines, persist them as CliXml.</p>
<p><strong>Duration:</strong> ~60 minutes</p>
<p>Open <code>labs/lab06-functions-remoting.md</code>.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" data-paginate="true" data-theme="noble-blue" lang="POSIX" data-marpit-pagination="33" style="--paginate:true;--theme:noble-blue;" data-marpit-pagination-total="34">
<h2 id="day-3-recap">Day 3 recap</h2>
<ul>
<li>Types matter for intent and for bitwise work (<code>[uint32]</code>)</li>
<li><code>PSCustomObject</code> + splatting = clean, readable scripts</li>
<li>Execution policy is a seatbelt, not a lock</li>
<li><code>try/catch</code> with <code>-ErrorAction Stop</code> handles real errors</li>
<li><code>Invoke-Command</code> scales one-liners to thousands of machines</li>
<li><code>$using:</code> carries local variables into remote blocks</li>
<li><code>-Parallel</code>, <code>Start-Job</code>, <code>-AsJob</code> — three kinds of concurrency</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-class="title" data-theme="noble-blue" lang="POSIX" class="title" data-marpit-pagination="34" style="--paginate:true;--class:title;--theme:noble-blue;" data-marpit-pagination-total="34">
<h1 id="end-of-day-3">End of Day 3</h1>
<h2 id="tomorrow-ad-and-entraid-in-hybrid-harmony">Tomorrow: AD and EntraID, in hybrid harmony</h2>
</section>
